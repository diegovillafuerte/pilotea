<!-- @dsCard group="Android app" viewport="430x800" name="Onboarding flow" subtitle="Pitch → WhatsApp auth → OTP → perfil → disclosure → accesibilidad → batería → listo" -->
<!-- @startingPoint section="Android app" subtitle="Full onboarding flow — interactive, 8 steps" viewport="430x880" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kompara — onboarding</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%); display:flex; align-items:center; justify-content:center; padding:24px; box-sizing:border-box; font-family: var(--font-sans); }
  .phone { width:390px; height:760px; border-radius:40px; overflow:hidden; position:relative; background:var(--background); box-shadow:0 24px 70px rgba(2,6,23,.6), 0 0 0 10px #0b1120, 0 0 0 11px #1e293b; display:flex; flex-direction:column; }
  .statusbar { height:30px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; font-size:12px; font-weight:600; color:var(--text-body); flex:none; }
  .topbar { display:flex; align-items:center; gap:12px; padding:6px 16px 12px; flex:none; }
  .body { flex:1; overflow-y:auto; padding:8px 20px 16px; }
  .footer { flex:none; padding:14px 20px 22px; display:flex; flex-direction:column; gap:10px; }
  .h1 { font-size:26px; font-weight:800; line-height:1.1; color:var(--text-strong); letter-spacing:-.02em; }
  .p { font-size:15px; line-height:1.55; color:var(--text-muted); margin-top:12px; }
  .lm { width:64px; height:64px; border-radius:16px; background:var(--emerald-600); display:flex; align-items:center; justify-content:center; }
  .dots { display:flex; gap:6px; }
  .dot { width:8px; height:8px; border-radius:999px; background:var(--surface-variant); }
  .dot.on { background:var(--primary); width:22px; }
  .back { background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; padding:0; width:24px; }
  .sec { background:var(--surface-card); border-radius:12px; padding:14px; margin-top:12px; }
  .sec h4 { margin:0; font-size:14px; font-weight:700; color:var(--text-strong); }
  .sec p { margin:4px 0 0; font-size:13px; line-height:1.5; color:var(--text-muted); }
  .step-line { display:flex; gap:10px; align-items:flex-start; margin-top:14px; }
  .step-n { flex:none; width:26px; height:26px; border-radius:999px; background:var(--primary); color:#fff; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; }
  .step-line p { margin:2px 0 0; font-size:14px; color:var(--text-body); line-height:1.45; }
  select { width:100%; height:52px; border-radius:12px; border:1.5px solid var(--border); background:var(--surface-card); color:var(--text-body); font-family:var(--font-sans); font-size:16px; padding:0 12px; }
  .center { text-align:center; }
  .bignum { font-size:30px; font-weight:800; color:#fff; }
  .rebar { height:4px; background:var(--surface-variant); border-radius:999px; overflow:hidden; }
  .refill { height:100%; background:var(--primary); transition:width .25s ease; }
  .link { background:none; border:none; color:var(--primary); font-size:14px; font-weight:600; cursor:pointer; }
</style>
</head>
<body class="theme-dark">
<div id="root"></div>
<script type="text/babel">
const { Button, TextField, OtpInput, Switch, Card, ProgressBar } = window.KomparaDesignSystem_722871;

function Logomark({size=34}){return <svg width={size} height={size} viewBox="0 0 48 48" fill="none"><path d="M14 10L14 38" stroke="#fff" strokeWidth="4.5" strokeLinecap="round"/><path d="M14 24L30 10" stroke="#fff" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M14 24L34 38" stroke="#fff" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round"/><rect x="30" y="18" width="4" height="10" rx="2" fill="#fff" opacity="0.5"/><rect x="36" y="14" width="4" height="14" rx="2" fill="#fff" opacity="0.5"/></svg>;}

const PITCH = [
  {t:"Entérate si conviene antes de aceptar", b:"Kompara lee la oferta en tu pantalla y te dice al instante, con un semáforo, si ese viaje te deja ganancia de verdad — antes de que toques \u201cAceptar\u201d."},
  {t:"Gana hasta 30% más por turno", b:"Rechazar los viajes que no convienen sube tu ganancia por hora. Es el promedio reportado por apps similares; tus resultados dependen de tu zona y horarios."},
  {t:"Lo que ves en tu pantalla se queda en tu teléfono", b:"Todo el cálculo ocurre en tu celular. Kompara no vende ni comparte lo que aparece en tu pantalla; tu cuenta solo guarda tu configuración y tus totales."},
];
const CITIES = ["Valle de México (CDMX + Edomex)","Monterrey","Guadalajara","Puebla-Tlaxcala","Toluca","Tijuana","León","Querétaro","Mérida","Cancún"];

// step order after pitch
const STEPS = ["phone","code","profile","disclosure","accessibility","oem","done"];

function App(){
  const [stage, setStage] = React.useState("pitch"); // pitch | <step>
  const [pitch, setPitch] = React.useState(0);
  const [phone, setPhone] = React.useState("");
  const [code, setCode] = React.useState("");
  const [name, setName] = React.useState("");
  const [city, setCity] = React.useState(CITIES[0]);
  const [accGranted, setAccGranted] = React.useState(false);

  const stepIdx = STEPS.indexOf(stage);
  const goStep = (s) => setStage(s);
  const next = () => { const i = STEPS.indexOf(stage); if(i<STEPS.length-1) setStage(STEPS[i+1]); };
  const back = () => {
    if(stage==="pitch"){ if(pitch>0) setPitch(pitch-1); return; }
    const i = STEPS.indexOf(stage); if(i>0) setStage(STEPS[i-1]); else setStage("pitch");
  };

  const showBack = !(stage==="pitch" && pitch===0) && stage!=="done";
  const showProgress = stepIdx>=0 && stage!=="done";

  let content, footer, title=null;

  if(stage==="pitch"){
    const p = PITCH[pitch];
    content = (
      <div style={{display:"flex", flexDirection:"column", height:"100%", justifyContent:"center"}}>
        <div className="lm"><Logomark/></div>
        <div className="h1" style={{marginTop:28}}>{p.t}</div>
        <div className="p">{p.b}</div>
      </div>
    );
    footer = (
      <React.Fragment>
        <div className="dots" style={{justifyContent:"center", marginBottom:6}}>
          {PITCH.map((_,i)=><span key={i} className={"dot"+(i===pitch?" on":"")}/>)}
        </div>
        <Button variant="primary" fullWidth onClick={()=> pitch<PITCH.length-1 ? setPitch(pitch+1) : goStep("phone")}>
          {pitch<PITCH.length-1 ? "Continuar" : "Empezar"}
        </Button>
      </React.Fragment>
    );
  } else if(stage==="phone"){
    content = (<div>
      <div className="h1">Crea tu cuenta</div>
      <div className="p">Tu cuenta guarda tu configuración y tus números de forma segura, para que no pierdas nada si cambias de teléfono. Solo necesitas tu número de WhatsApp.</div>
      <div style={{marginTop:20}}>
        <TextField label="Número de WhatsApp" prefix="+52" inputMode="tel" maxLength={12} value={phone} onChange={setPhone} placeholder="55 1234 5678" />
      </div>
      <div className="p" style={{fontSize:12}}>Usamos tu número únicamente para tu cuenta. Lo que el lector ve en tu pantalla se queda en tu teléfono.</div>
    </div>);
    footer = <Button variant="primary" fullWidth disabled={phone.replace(/\D/g,"").length<10} onClick={next}>Recibir código por WhatsApp</Button>;
  } else if(stage==="code"){
    content = (<div>
      <div className="h1">Escribe el código</div>
      <div className="p">Te enviamos un código de 6 dígitos por WhatsApp al +52 {phone || "55 1234 5678"}.</div>
      <div style={{marginTop:20}}><OtpInput value={code} onChange={setCode}/></div>
      <div style={{marginTop:16, display:"flex", gap:16}}>
        <button className="link">Reenviar código</button>
        <button className="link" onClick={()=>goStep("phone")}>Cambiar número</button>
      </div>
    </div>);
    footer = <Button variant="primary" fullWidth disabled={code.length<6} onClick={next}>Confirmar código</Button>;
  } else if(stage==="profile"){
    content = (<div>
      <div className="h1">Cuéntanos de ti</div>
      <div className="p">Con tu ciudad comparamos tus ganancias con las de otros conductores cerca de ti. Puedes cambiarla cuando quieras.</div>
      <div style={{marginTop:20, display:"flex", flexDirection:"column", gap:16}}>
        <TextField label="Tu nombre (opcional)" value={name} onChange={setName} placeholder="Tu nombre"/>
        <label><span style={{display:"block", fontSize:12, fontWeight:500, color:"var(--text-muted)", marginBottom:6}}>Tu ciudad</span>
          <select value={city} onChange={(e)=>setCity(e.target.value)}>{CITIES.map(c=><option key={c}>{c}</option>)}</select>
        </label>
      </div>
    </div>);
    footer = (<React.Fragment>
      <Button variant="primary" fullWidth onClick={next}>Guardar y continuar</Button>
      <Button variant="text" fullWidth onClick={next}>Completar después</Button>
    </React.Fragment>);
  } else if(stage==="disclosure"){
    title = "disclosure";
    content = (<div>
      <div className="h1">Antes de continuar: qué hace Kompara</div>
      <div className="p">Para darte el veredicto de cada viaje, Kompara necesita el servicio de accesibilidad de Android. Léelo con calma.</div>
      <div className="sec"><h4>Qué lee</h4><p>El contenido de pantalla de Uber y DiDi mientras manejas — los textos de la oferta (tarifa, distancia, tiempo y destino).</p></div>
      <div className="sec"><h4>Para qué</h4><p>Únicamente para calcular las métricas del viaje (ganancia por km y por hora) y mostrarte el semáforo.</p></div>
      <div className="sec"><h4>Dónde se procesa</h4><p>Solo en tu teléfono. Kompara no vende, no comparte ni sube a internet el contenido de tu pantalla.</p></div>
      <div className="sec"><h4>Riesgo a tener en cuenta</h4><p>Usar herramientas de terceros puede contravenir los términos de las plataformas. Kompara solo lee y nunca actúa por ti.</p></div>
    </div>);
    footer = (<React.Fragment>
      <Button variant="primary" fullWidth onClick={next}>Aceptar y continuar</Button>
      <Button variant="text" fullWidth onClick={next}>No acepto</Button>
    </React.Fragment>);
  } else if(stage==="accessibility"){
    content = (<div>
      <div className="h1">Activa el lector de Kompara</div>
      <div className="p">Te llevamos a los Ajustes de accesibilidad de Android. Sigue estos pasos:</div>
      <div className="step-line"><span className="step-n">1</span><p>Busca <b>Kompara</b> en la lista de servicios.</p></div>
      <div className="step-line"><span className="step-n">2</span><p>Toca Kompara y activa el interruptor.</p></div>
      <div className="step-line"><span className="step-n">3</span><p>Confirma en el aviso del sistema y regresa aquí.</p></div>
      <div style={{marginTop:18}}>
        <Card>
          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
            <span style={{fontWeight:700, fontSize:15}}>Lector de pantalla</span>
            <span style={{fontSize:12, fontWeight:600, color: accGranted?"var(--verde)":"var(--text-muted)"}}>{accGranted?"Activo":"Esperando…"}</span>
          </div>
        </Card>
      </div>
    </div>);
    footer = accGranted
      ? <Button variant="primary" fullWidth onClick={next}>¡Listo! Continuar</Button>
      : (<React.Fragment>
          <Button variant="primary" fullWidth onClick={()=>setAccGranted(true)}>Abrir ajustes de accesibilidad</Button>
          <div className="center" style={{fontSize:12, color:"var(--text-faint)"}}>Esperando a que actives el lector…</div>
        </React.Fragment>);
  } else if(stage==="oem"){
    content = (<div>
      <div className="h1">Que tu teléfono no apague el lector</div>
      <div className="p">Tu teléfono puede cerrar Kompara en segundo plano para ahorrar batería. Haz esto para que siga funcionando mientras manejas:</div>
      <div className="step-line"><span className="step-n">1</span><p>Pon a Kompara en batería <b>Sin restricciones</b>.</p></div>
      <div className="step-line"><span className="step-n">2</span><p>En Recientes, fija Kompara con el candado para que no se cierre sola.</p></div>
      <div className="sec" style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <div><h4>Avísame si el lector se apaga</h4><p>Activa los avisos para enterarte si tu teléfono apaga el lector.</p></div>
        <Switch checked={true} onChange={()=>{}}/>
      </div>
    </div>);
    footer = (<React.Fragment>
      <Button variant="secondary" fullWidth onClick={next}>Abrir ajustes de batería</Button>
      <Button variant="primary" fullWidth onClick={next}>Ya lo configuré</Button>
    </React.Fragment>);
  } else if(stage==="done"){
    content = (<div className="center" style={{display:"flex", flexDirection:"column", height:"100%", justifyContent:"center", alignItems:"center"}}>
      <div className="lm" style={{width:80, height:80, borderRadius:20}}><Logomark size={44}/></div>
      <div className="h1" style={{marginTop:28}}>¡Todo listo para manejar!</div>
      <div className="p">Kompara ya está leyendo tus ofertas. Prueba el lector con un viaje de ejemplo para ver cómo se ve el veredicto.</div>
    </div>);
    footer = (<React.Fragment>
      <Button variant="primary" fullWidth onClick={()=>{ setStage("pitch"); setPitch(0); setPhone(""); setCode(""); setAccGranted(false); }}>Probar el lector</Button>
      <Button variant="text" fullWidth onClick={()=>{ setStage("pitch"); setPitch(0); }}>Reiniciar demo</Button>
    </React.Fragment>);
  }

  return (
    <div className="phone">
      <div className="statusbar"><span>9:41</span><span>▲ Kompara · 100%</span></div>
      <div className="topbar">
        {showBack ? <button className="back" onClick={back}>‹</button> : <span style={{width:24}}/>}
        {showProgress && <div style={{flex:1}}><div className="rebar"><div className="refill" style={{width:((stepIdx+1)/STEPS.length*100)+"%"}}/></div></div>}
        {showProgress && <span style={{fontSize:11, color:"var(--text-faint)"}}>{stepIdx+1}/{STEPS.length}</span>}
      </div>
      <div className="body" key={stage+"-"+pitch}>{content}</div>
      <div className="footer">{footer}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
