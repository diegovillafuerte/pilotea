<!-- @dsCard group="Components" viewport="700x440" name="Forms — fields, OTP, switch, slider" subtitle="Text field, 6-digit code, switch, threshold slider" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .lbl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 10px; font-weight: 600; }
  .rowc { display:flex; align-items:center; justify-content:space-between; background:var(--surface-card); border-radius:12px; padding:14px 16px; }
</style>
</head>
<body class="theme-dark">
<div id="root"></div>
<script type="text/babel">
  const { TextField, OtpInput, Switch, Slider } = window.KomparaDesignSystem_722871;
  function Demo() {
    const [phone, setPhone] = React.useState("55 1234 5678");
    const [code, setCode] = React.useState("1432");
    const [notif, setNotif] = React.useState(true);
    const [ev, setEv] = React.useState(false);
    const [green, setGreen] = React.useState(9.2);
    return (
      <div className="grid">
        <div>
          <p className="lbl">Text field</p>
          <TextField label="Número de WhatsApp" prefix="+52" inputMode="tel" value={phone} onChange={setPhone} hint="Te mandamos un código por WhatsApp." />
        </div>
        <div>
          <p className="lbl">OTP code</p>
          <OtpInput value={code} onChange={setCode} />
        </div>
        <div>
          <p className="lbl">Switch</p>
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            <div className="rowc"><span style={{fontSize:14}}>Activar avisos</span><Switch checked={notif} onChange={setNotif}/></div>
            <div className="rowc"><span style={{fontSize:14}}>Vehículo eléctrico</span><Switch checked={ev} onChange={setEv}/></div>
          </div>
        </div>
        <div>
          <p className="lbl">Slider — piso del semáforo</p>
          <div style={{background:"var(--surface-card)", borderRadius:12, padding:16}}>
            <Slider label="Verde desde" valueText={`$${green.toFixed(1)}/km`} value={green} min={3} max={20} step={0.1} onChange={setGreen}/>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
