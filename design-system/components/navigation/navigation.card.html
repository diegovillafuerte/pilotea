<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .lbl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 10px; font-weight: 600; }
  .phone { width: 320px; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .pad { height: 86px; display:flex; align-items:flex-end; }
  .row { display: flex; gap: 40px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { BottomNav } = window.KomparaDesignSystem_722871;
  function Bar({ theme, current }) {
    return (
      <div className={theme}>
        <p className="lbl">{theme === "theme-dark" ? "Dark (app default)" : "Light"}</p>
        <div className="phone">
          <div className="pad" style={{background:"var(--background)"}}></div>
          <BottomNav current={current} />
        </div>
      </div>
    );
  }
  function Demo() {
    return (
      <div className="row">
        <Bar theme="theme-dark" current="inicio" />
        <Bar theme="theme-light" current="comparar" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
