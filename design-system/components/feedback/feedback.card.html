<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .lbl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 10px; font-weight: 600; }
  .grid { display:grid; grid-template-columns: 1.1fr 1fr; gap: 22px; align-items:start; }

<body class="theme-dark">
<div id="root"></div>
<script type="text/babel">
  const { Dialog, ProgressBar, StatusChip } = window.KomparaDesignSystem_722871;
  function Demo() {
    return (
      <div className="grid">
        <div>
          <p className="lbl">Dialog — prominent disclosure</p>
          <div className="stage">
            <Dialog open title="Kompara leerá tu pantalla" confirmText="Continuar" cancelText="Ahora no">

            <StatusChip tone="neutral">Importado</StatusChip>

      </div>

  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
