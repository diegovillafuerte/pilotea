<!-- @dsCard group="Components" viewport="700x470" name="Metrics — cards, percentiles, consejos" subtitle="Metric tiles, Top X% pills, the 20-person bar, recommendation cards" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .lbl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 10px; font-weight: 600; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .pbar { background: var(--surface-card); border-radius: 12px; padding: 16px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .sec { margin-top: 22px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { MetricCard, PercentileBadge, PercentileBar, RecommendationCard } = window.KomparaDesignSystem_722871;
  function Demo() {
    return (
      <div>
        <p className="lbl">Metric cards</p>
        <div className="grid2">
          <MetricCard label="$ POR HORA" value="$165.00" badge={<PercentileBadge topPercent={22} />} />
          <MetricCard label="$ POR KM" value="$8.40" badge={<PercentileBadge topPercent={31} />} />
          <MetricCard label="$ POR VIAJE" value="$90.80" />
          <MetricCard label="VIAJES POR HORA" value="1.7" badge={<PercentileBadge locked />} />
        </div>

        <div className="sec">
          <p className="lbl">Percentile bar — 20 people</p>
          <div className="pbar">
            <div style={{fontSize:16,fontWeight:600,marginBottom:10}}>Le ganas al 78% de los conductores de tu ciudad</div>
            <PercentileBar displayPercentile={78} />
          </div>
        </div>

        <div className="sec">
          <p className="lbl">Recommendations</p>
          <div className="stack">
            <RecommendationCard type="warning" title="Dejaste ir buenos viajes" body="Rechazaste 3 ofertas que sí te convenían — $420 que se te fueron." />
            <RecommendationCard type="info" title="Tus mejores horas" body="Tu mejor bloque fue el viernes de 19:00 a 20:00: $340 netos. Maneja más en ese horario." />
            <RecommendationCard type="positive" title="¡4 semanas seguidas!" body="Llevas 4 semanas registrando tus datos sin parar." />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
