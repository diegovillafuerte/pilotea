<!-- @dsCard group="Type" viewport="760x180" name="Inter — the typeface" subtitle="One family, five weights · shared by app and website" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--background);font-family:var(--font-sans);color:var(--text-strong)}
  .big{font-size:52px;letter-spacing:-0.02em;line-height:1;margin:0}
  .weights{display:flex;gap:22px;margin-top:18px;flex-wrap:wrap}
  .w b{display:block;font-size:24px}
  .w span{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em}
  .cap{font-size:11px;color:var(--text-faint);margin:0 0 10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
</style></head>
<body>
<p class="cap">Inter</p>
<p class="big">Sabe cuánto ganas $1,234.56</p>
<div class="weights">
  <div class="w"><b style="font-weight:400">Aa</b><span>Regular 400</span></div>
  <div class="w"><b style="font-weight:500">Aa</b><span>Medium 500</span></div>
  <div class="w"><b style="font-weight:600">Aa</b><span>SemiBold 600</span></div>
  <div class="w"><b style="font-weight:700">Aa</b><span>Bold 700</span></div>
  <div class="w"><b style="font-weight:900">Aa</b><span>Black 900</span></div>
</div>
</body></html>
