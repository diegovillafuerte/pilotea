<!-- @dsCard group="Type" viewport="760x240" name="Headings & titles" subtitle="headline → title scale, tracked tight" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--background);font-family:var(--font-sans);color:var(--text-strong)}
  .row{display:flex;align-items:baseline;gap:14px;margin-bottom:10px}
  .spec{font-size:11px;color:var(--text-faint);font-variant:tabular-nums;white-space:nowrap}
  .cap{font-size:11px;color:var(--text-faint);margin:0 0 14px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
</style></head>
<body>
<p class="cap">Headings & titles</p>
<div class="row"><span style="font-size:28px;font-weight:700;letter-spacing:-.02em">Headline medium</span><span class="spec">28 / Bold</span></div>
<div class="row"><span style="font-size:24px;font-weight:700;letter-spacing:-.02em">Título de pantalla</span><span class="spec">headline · 24 / Bold</span></div>
<div class="row"><span style="font-size:22px;font-weight:600">Etiqueta de botón</span><span class="spec">title-lg · 22 / SemiBold</span></div>
<div class="row"><span style="font-size:16px;font-weight:700">Título de tarjeta / sección</span><span class="spec">title · 16 / Bold</span></div>
<div class="row"><span style="font-size:14px;font-weight:600">Subtítulo</span><span class="spec">title-sm · 14 / SemiBold</span></div>
</body></html>
