<!-- @dsCard group="Colors" viewport="760x150" name="Neutral — Slate" subtitle="Slate scale · backgrounds, surfaces, text" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px;background:var(--background);font-family:var(--font-sans)}
  .row{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
  .n{font-size:11px;font-weight:600;color:#fff;opacity:.95}
  .h{font-size:9px;color:#fff;opacity:.8;font-variant:tabular-nums}
  .dark .n,.dark .h{color:#0f172a}
  .cap{font-size:11px;color:var(--text-faint);margin:0 0 10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
</style></head>
<body>
<p class="cap">Slate — neutral</p>
<div class="row" id="r"></div>
<script>
  const sc=[["50","#f8fafc"],["100","#f1f5f9"],["200","#e2e8f0"],["300","#cbd5e1"],["400","#94a3b8"],["500","#64748b"],["600","#475569"],["700","#334155"],["800","#1e293b"],["900","#0f172a"],["950","#020617"]];
  document.getElementById("r").innerHTML=sc.map(([n,h],i)=>`<div class="sw ${i<4?'dark':''}" style="background:${h}"><span class="n">${n}</span><span class="h">${h}</span></div>`).join("");
</script>
</body></html>
