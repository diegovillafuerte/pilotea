<!-- @dsCard group="Spacing" viewport="760x180" name="Corner radius" subtitle="Buttons 14 · cards 12 · chip 16 · logomark tile 7 · pills fully round" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--background);font-family:var(--font-sans)}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{text-align:center}
  .box{width:84px;height:64px;background:var(--surface-card);border:1.5px solid var(--primary)}
  .v{font-size:12px;font-weight:700;color:var(--text-strong);margin-top:8px}
  .t{font-size:10px;color:var(--text-faint)}
  .pill{width:84px;height:40px;border-radius:999px;background:var(--primary)}
  .cap{font-size:11px;color:var(--text-faint);margin:0 0 16px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
</style></head>
<body>
<p class="cap">Corner radius</p>
<div class="row">
  <div class="item"><div class="box" style="border-radius:7px"></div><div class="v">7px</div><div class="t">logomark tile</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="v">12px</div><div class="t">card</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="v">14px</div><div class="t">button</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="v">16px</div><div class="t">chip / web card</div></div>
  <div class="item"><div class="pill"></div><div class="v">999px</div><div class="t">pill / badge</div></div>
</div>
</body></html>
