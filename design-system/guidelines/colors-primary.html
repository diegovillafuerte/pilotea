<!-- @dsCard group="Colors" viewport="760x150" name="Primary — Emerald" subtitle="Brand green scale · 600 is the canonical brand color" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px;background:var(--background);font-family:var(--font-sans)}
  .row{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
  .n{font-size:11px;font-weight:600;color:#fff;opacity:.95}
  .h{font-size:9px;color:#fff;opacity:.8;font-variant:tabular-nums}
  .dark .n,.dark .h{color:#0f172a}
  .star{position:relative}
  .star::after{content:"brand";position:absolute;top:6px;left:8px;font-size:9px;font-weight:700;color:#fff;background:rgba(0,0,0,.25);padding:2px 5px;border-radius:4px}
  .cap{font-size:11px;color:var(--text-faint);margin:0 0 10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
</style></head>
<body>
<p class="cap">Emerald — primary</p>
<div class="row" id="r"></div>
<script>
  const sc=[["50","#ecfdf5"],["100","#d1fae5"],["200","#a7f3d0"],["300","#6ee7b7"],["400","#34d399"],["500","#10b981"],["600","#059669"],["700","#047857"],["800","#065f46"],["900","#064e3b"],["950","#022c22"]];
  document.getElementById("r").innerHTML=sc.map(([n,h],i)=>`<div class="sw ${i<4?'dark':''} ${n==='600'?'star':''}" style="background:${h}"><span class="n">${n}</span><span class="h">${h}</span></div>`).join("");
</script>
</body></html>
