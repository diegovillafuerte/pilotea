<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--background);font-family:var(--font-sans);color:var(--text-body)}
  .row{margin-bottom:12px;display:flex;gap:14px;align-items:baseline}
  .spec{font-size:11px;color:var(--text-faint);font-variant:tabular-nums;white-space:nowrap;flex:none}
  .cap{font-size:11px;color:var(--text-faint);margin:0 0 14px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
</style></head>
<body>
<p class="cap">Body & labels</p>
<div class="row"><span style="font-size:16px;line-height:1.5">Body large — texto enfático e introducciones de pantalla.</span><span class="spec">body-lg · 16</span></div>
<div class="row"><span style="font-size:14px;line-height:1.45;color:var(--text-muted)">Body — el cuerpo por defecto. Plano, concreto, en es-MX y de tú.</span><span class="spec">body · 14</span></div>
<div class="row"><span style="font-size:12px;line-height:1.4;color:var(--text-muted)">Body small — pistas, leyendas y bodies compactos.</span><span class="spec">body-sm · 12</span></div>
<div class="row"><span style="font-size:12px;font-weight:500;color:var(--text-muted)">LABEL · chips · estados · pasos</span><span class="spec">label · 12 / Medium</span></div>
</body></html>
