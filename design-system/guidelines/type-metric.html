<!-- @dsCard group="Type" viewport="760x210" name="Metric type — the numbers" subtitle="The numbers are the product · Black, oversized, tabular" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--background);font-family:var(--font-sans);color:var(--text-strong)}
  .row{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
  .spec{font-size:11px;color:var(--text-faint);font-variant:tabular-nums;white-space:nowrap}
  .num{font-variant-numeric:tabular-nums}
  .cap{font-size:11px;color:var(--text-faint);margin:0 0 14px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .lbl{font-size:13px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted)}
</style></head>
<body>
<p class="cap">Metric styles</p>
<div class="row"><span class="num" style="font-size:44px;font-weight:900;line-height:1">$3,450.00</span><span class="spec">metric-value-lg · 44 / Black</span></div>
<div class="row"><span class="num" style="font-size:30px;font-weight:700;line-height:1">$165.00</span><span class="spec">metric-value · 30 / Bold</span></div>
<div class="row"><span class="lbl">Ganancia neta esta semana</span><span class="spec">metric-label · 13 / Medium · uppercase</span></div>
</body></html>
