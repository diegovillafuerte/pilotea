<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Tu cuenta" description="Account management — WhatsApp/name/city fields, logout, delete account" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:var(--font-sans)}
    .frame{width:390px;height:760px;border-radius:40px;overflow:hidden;position:relative;background:var(--background);box-shadow:0 24px 70px rgba(2,6,23,.6),0 0 0 10px #0b1120,0 0 0 11px #1e293b;display:flex;flex-direction:column}
    .sb{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text-body);flex:none}
    .body{flex:1;overflow-y:auto;padding:16px}
    .h1{font-size:24px;font-weight:700;color:var(--text-strong)}
    .fields{margin-top:16px;display:flex;flex-direction:column;gap:14px}
    .actions{margin-top:16px;display:flex;flex-direction:column;gap:10px}
  </style>
</helmet>
<div class="frame theme-dark">
  <div class="sb"><span>9:41</span><span>▲ Kompara · 100%</span></div>
  <div class="body">
    <div class="h1">Tu cuenta</div>
    <div class="fields">
      <x-import component-from-global-scope="KomparaDesignSystem_722871.TextField" label="WhatsApp" value="+52 55 1234 5678" hint-size="100%,80px"></x-import>
      <x-import component-from-global-scope="KomparaDesignSystem_722871.TextField" label="Tu nombre" value="Carlos" hint-size="100%,80px"></x-import>
      <x-import component-from-global-scope="KomparaDesignSystem_722871.TextField" label="Tu ciudad" value="Monterrey" hint-size="100%,80px"></x-import>
    </div>
    <div class="actions">
      <x-import component-from-global-scope="KomparaDesignSystem_722871.Button" variant="primary" full-width="{{ true }}" hint-size="100%,52px">Guardar cambios</x-import>
      <x-import component-from-global-scope="KomparaDesignSystem_722871.Button" variant="secondary" full-width="{{ true }}" hint-size="100%,52px">Cerrar sesión</x-import>
      <x-import component-from-global-scope="KomparaDesignSystem_722871.Button" variant="text" full-width="{{ true }}" hint-size="100%,40px" style="color:var(--rojo)">Eliminar mi cuenta</x-import>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
