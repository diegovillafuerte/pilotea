<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Importar semana" description="Import a past week — the 4-step AI extraction progress (reading → extracting → calculating → comparing)" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:var(--font-sans)}
    .frame{width:390px;height:760px;border-radius:40px;overflow:hidden;position:relative;background:var(--background);box-shadow:0 24px 70px rgba(2,6,23,.6),0 0 0 10px #0b1120,0 0 0 11px #1e293b;display:flex;flex-direction:column}
    .sb{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text-body);flex:none}
    .body{flex:1;overflow-y:auto;padding:16px}
    .h1{font-size:24px;font-weight:700;color:var(--text-strong)}
    .sub{font-size:14px;color:var(--text-muted);margin-top:6px;line-height:1.5}
    .card{background:var(--surface-card);border-radius:12px;padding:16px;margin-top:18px}
    .lbl{font-size:13px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
    .srow{display:flex;align-items:center;gap:10px;padding:7px 0;opacity:.35}
    .srow.on{opacity:1}
    .ck{width:18px;height:18px;border-radius:999px;border:2px solid var(--border-strong);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
    .ck.done{background:var(--primary);border-color:var(--primary)}
    .srow span.t{font-size:14px;color:var(--text-body)}
  </style>
</helmet>
<div class="frame theme-dark">
  <div class="sb"><span>9:41</span><span>▲ Kompara · 100%</span></div>
  <div class="body">
    <div class="h1">Importar semana</div>
    <div class="sub">Trae semanas que el lector no capturó: tu historial de antes de instalar Kompara.</div>
    <div class="card">
      <div class="lbl">Uber — PDF semanal</div>
      <div class="srow {{ r0 }}"><span class="ck {{ c0 }}">{{ k0 }}</span><span class="t">Leyendo archivos…</span></div>
      <div class="srow {{ r1 }}"><span class="ck {{ c1 }}">{{ k1 }}</span><span class="t">Extrayendo datos con IA…</span></div>
      <div class="srow {{ r2 }}"><span class="ck {{ c2 }}">{{ k2 }}</span><span class="t">Calculando métricas…</span></div>
      <div class="srow {{ r3 }}"><span class="ck {{ c3 }}">{{ k3 }}</span><span class="t">Comparando con conductores…</span></div>
      <div style="margin-top:10px"><x-import component-from-global-scope="KomparaDesignSystem_722871.ProgressBar" value="{{ progress }}" hint-size="100%,8px"></x-import></div>
      <div style="font-size:12px;color:var(--text-faint);margin-top:8px">Esto toma entre 5 y 15 segundos</div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { step: 0 };
  componentDidMount() {
    this._t = setInterval(() => this.setState({ step: (this.state.step + 1) % 5 }), 1100);
  }
  componentWillUnmount() { clearInterval(this._t); }
  renderVals() {
    const step = this.state.step;
    const v = {};
    for (let i = 0; i < 4; i++) {
      v["r" + i] = i <= step ? "on" : "";
      v["c" + i] = i < step ? "done" : "";
      v["k" + i] = i < step ? "✓" : "";
    }
    v.progress = step / 4;
    return v;
  }
}
</script>
</body>
</html>
