<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Tu Mes (shareable card)" description="Wrapped-style shareable monthly earnings card with WhatsApp share CTA" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:var(--font-sans)}
    .frame{width:390px;height:760px;border-radius:40px;overflow:hidden;position:relative;background:var(--background);box-shadow:0 24px 70px rgba(2,6,23,.6),0 0 0 10px #0b1120,0 0 0 11px #1e293b;display:flex;flex-direction:column}
    .sb{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text-body);flex:none}
    .body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
    .h1{font-size:24px;font-weight:700;color:var(--text-strong)}
    .card{border-radius:20px;padding:22px;background:linear-gradient(150deg,#047857 0%,#059669 55%,#10b981 100%);color:#fff;box-shadow:0 12px 30px rgba(4,120,87,.5)}
    .brand{display:flex;align-items:center;gap:7px;opacity:.95;font-weight:600;font-size:14px}
    .net{font-size:46px;font-weight:900;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}
    .stats .k{font-size:12px;opacity:.85}
    .stats .v{font-size:22px;font-weight:800}
    .row{display:flex;align-items:center;justify-content:space-between;padding:4px 2px}
  </style>
</helmet>
<div class="frame theme-dark">
  <div class="sb"><span>9:41</span><span>▲ Kompara · 100%</span></div>
  <div class="body">
    <div class="h1">Tu mes en Kompara</div>
    <div class="card">
      <div class="brand">
        <svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M14 10L14 38" stroke="#fff" stroke-width="4.5" stroke-linecap="round"></path><path d="M14 24L30 10" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"></path><path d="M14 24L34 38" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        <span>Kompara · Junio</span>
      </div>
      <div style="font-size:13px;opacity:.9;margin-top:18px">Ganancia neta del mes</div>
      <div class="net">$14,820</div>
      <div class="stats">
        <div><div class="k">Tu lugar</div><div class="v">Top 22%</div></div>
        <div><div class="k">Mejor app</div><div class="v">DiDi</div></div>
        <div><div class="k">Mejor día</div><div class="v">Sábado</div></div>
        <div><div class="k">Racha</div><div class="v">🔥 4 sem</div></div>
      </div>
    </div>
    <x-import component-from-global-scope="KomparaDesignSystem_722871.Button" variant="primary" full-width="true" hint-size="100%,52px">Compartir en WhatsApp</x-import>
    <div class="row"><span style="font-size:14px;color:var(--text-muted)">Ocultar montos al compartir</span>
      <x-import component-from-global-scope="KomparaDesignSystem_722871.Switch" hint-size="48px,28px"></x-import>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
