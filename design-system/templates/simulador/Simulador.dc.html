<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Simulador" description="Reader simulator — toggle a sample offer and watch the verdict chip change live" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:var(--font-sans)}
    .frame{width:390px;height:760px;border-radius:40px;overflow:hidden;position:relative;background:var(--background);box-shadow:0 24px 70px rgba(2,6,23,.6),0 0 0 10px #0b1120,0 0 0 11px #1e293b;display:flex;flex-direction:column}
    .sb{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text-body);flex:none}
    .body{flex:1;overflow-y:auto;padding:16px}
    .h1{font-size:24px;font-weight:700;color:var(--text-strong)}
    .sub{font-size:14px;color:var(--text-muted);margin-top:6px;line-height:1.5}
    .host{margin-top:18px;border-radius:16px;height:200px;background:linear-gradient(160deg,#11161f,#0b0f17);position:relative;border:1px solid var(--border)}
    .seg{display:flex;background:var(--surface-card);border-radius:10px;padding:3px;margin-top:16px}
    .seg button{flex:1;border:none;background:none;color:var(--text-muted);font-family:var(--font-sans);font-size:13px;font-weight:600;padding:8px;border-radius:8px;cursor:pointer}
    .seg button.on{background:var(--primary);color:#fff}
  </style>
</helmet>
<div class="frame theme-dark">
  <div class="sb"><span>9:41</span><span>▲ Kompara · 100%</span></div>
  <div class="body">
    <div class="h1">Simulador</div>
    <div class="sub">Prueba el lector con un viaje de ejemplo. Ajusta y mira cómo cambia el veredicto.</div>
    <div class="host">
      <div style="padding:16px"><div style="font-size:12px;color:var(--text-faint)">Oferta de ejemplo</div><div style="font-size:30px;font-weight:800;color:#fff;margin-top:6px">{{ fare }}</div><div style="font-size:13px;color:#94a3b8;margin-top:4px">{{ trip }}</div></div>
      <div style="position:absolute;right:14px;bottom:14px"><x-import component-from-global-scope="KomparaDesignSystem_722871.VerdictChip" level="{{ level }}" hero-rate="{{ hero }}" secondary-rate="{{ sec }}" hint-size="150px,110px"></x-import></div>
    </div>
    <div class="seg">
      <button class="{{ gCls }}" onClick="{{ pickG }}">Conviene</button>
      <button class="{{ yCls }}" onClick="{{ pickY }}">Regular</button>
      <button class="{{ rCls }}" onClick="{{ pickR }}">No conviene</button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { level: "green" };
  DATA = {
    green:  { hero: "$9.20/km", sec: "$165/h", fare: "$148", trip: "16 km · 22 min" },
    yellow: { hero: "$6.10/km", sec: "$118/h", fare: "$95",  trip: "15 km · 24 min" },
    red:    { hero: "$3.10/km", sec: "$78/h",  fare: "$62",  trip: "20 km · 31 min" },
  };
  renderVals() {
    const lvl = this.state.level;
    const d = this.DATA[lvl];
    return {
      level: lvl, hero: d.hero, sec: d.sec, fare: d.fare, trip: d.trip,
      gCls: lvl === "green" ? "on" : "",
      yCls: lvl === "yellow" ? "on" : "",
      rCls: lvl === "red" ? "on" : "",
      pickG: () => this.setState({ level: "green" }),
      pickY: () => this.setState({ level: "yellow" }),
      pickR: () => this.setState({ level: "red" }),
    };
  }
}
</script>
</body>
</html>
