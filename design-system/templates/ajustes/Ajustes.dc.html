<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Ajustes" description="Settings list — account, costs, semáforo, simulator, referral, help + debug premium toggle" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:var(--font-sans)}
    .frame{width:390px;height:760px;border-radius:40px;overflow:hidden;position:relative;background:var(--background);box-shadow:0 24px 70px rgba(2,6,23,.6),0 0 0 10px #0b1120,0 0 0 11px #1e293b;display:flex;flex-direction:column}
    .sb{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text-body);flex:none}
    .body{flex:1;overflow-y:auto;padding:16px}
    .h1{font-size:24px;font-weight:700;color:var(--text-strong)}
    .listrow{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface-card);border-radius:12px}
    .listrow span.lbl{font-size:15px;color:var(--text-body)}
    .chev{color:var(--text-faint)}
    .stack{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  </style>
</helmet>
<div class="frame theme-dark">
  <div class="sb"><span>9:41</span><span>▲ Kompara · 100%</span></div>
  <div class="body">
    <div class="h1">Ajustes</div>
    <div class="stack">
      <div class="listrow"><span class="lbl">Tu cuenta</span><span class="chev">›</span></div>
      <div class="listrow"><span class="lbl">Tus costos</span><span class="chev">›</span></div>
      <div class="listrow"><span class="lbl">Tu semáforo</span><span class="chev">›</span></div>
      <div class="listrow"><span class="lbl">Ver el simulador</span><span class="chev">›</span></div>
      <div class="listrow"><span class="lbl">Invita y gana</span><span class="chev">›</span></div>
      <div class="listrow"><span class="lbl">Ayuda</span><span class="chev">›</span></div>
    </div>
    <div class="listrow" style="margin-top:16px"><span style="font-size:14px;color:var(--text-muted)">Premium (prueba) — desbloquea todo</span><x-import component-from-global-scope="KomparaDesignSystem_722871.Switch" hint-size="48px,28px"></x-import></div>
  </div>
</div>
</x-dc>
</body>
</html>
