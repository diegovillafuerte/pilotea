<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="App screen" description="Kompara Android screen scaffold — dark frame, status bar, content area, five-tab bottom nav" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:var(--font-sans)}
  </style>
</helmet>
<div class="theme-dark" style="width:390px;height:760px;border-radius:40px;overflow:hidden;position:relative;background:var(--background);box-shadow:0 24px 70px rgba(2,6,23,.6), 0 0 0 10px #0b1120, 0 0 0 11px #1e293b">
  <div style="height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text-body)">
    <span>9:41</span><span>▲ Kompara · 100%</span>
  </div>
  <div style="position:absolute;top:30px;bottom:64px;left:0;right:0;overflow-y:auto;padding:16px">
    <div style="font-size:24px;font-weight:700;color:var(--text-strong)">Título de pantalla</div>
    <div style="font-size:14px;color:var(--text-muted);margin-top:6px">Intro de la pantalla, en es-MX y de tú. Reemplaza este contenido con tus tarjetas, métricas y consejos.</div>
    <div style="margin-top:16px;border:1.5px dashed var(--border);border-radius:12px;min-height:280px;display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:13px">
      Contenido de la pantalla
    </div>
  </div>
  <div style="position:absolute;bottom:0;left:0;right:0">
    <x-import component-from-global-scope="KomparaDesignSystem_722871.BottomNav" current="inicio" hint-size="390px,64px"></x-import>
  </div>
</div>
</x-dc>
</body>
</html>
