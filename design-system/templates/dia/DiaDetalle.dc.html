<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Detalle del día" description="Day detail — net + trips metric tiles, shifts, offer funnel, best-hours verdicts" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:var(--font-sans)}
    .frame{width:390px;height:760px;border-radius:40px;overflow:hidden;position:relative;background:var(--background);box-shadow:0 24px 70px rgba(2,6,23,.6),0 0 0 10px #0b1120,0 0 0 11px #1e293b;display:flex;flex-direction:column}
    .sb{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text-body);flex:none}
    .body{flex:1;overflow-y:auto;padding:16px}
    .h1{font-size:24px;font-weight:700;color:var(--text-strong)}
    .sub{font-size:14px;color:var(--text-muted);margin-top:6px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
    .lbl{font-size:13px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);margin-top:18px}
    .listrow{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface-card);border-radius:12px;margin-top:8px}
  </style>
</helmet>
<div class="frame theme-dark">
  <div class="sb"><span>9:41</span><span>▲ Kompara · 100%</span></div>
  <div class="body">
    <div class="h1">Detalle del día</div>
    <div class="sub">Viernes 6 de junio</div>
    <div class="grid">
      <x-import component-from-global-scope="KomparaDesignSystem_722871.MetricCard" label="NETO DEL DÍA" value="$680.00" hint-size="100%,90px"></x-import>
      <x-import component-from-global-scope="KomparaDesignSystem_722871.MetricCard" label="VIAJES" value="9" hint-size="100%,90px"></x-import>
    </div>
    <div class="lbl">Turnos</div>
    <div class="listrow"><span style="font-size:14px">18:00–23:30 · 9 viajes</span><span style="font-weight:700;color:var(--primary)">$680.00</span></div>
    <div class="lbl">Ofertas</div>
    <div class="listrow"><span style="font-size:14px;color:var(--text-muted)">14 vistas · 9 aceptadas · 5 rechazadas</span></div>
    <div class="lbl">Mejores horas</div>
    <div class="listrow"><span style="font-size:14px">19:00–20:00</span><x-import component-from-global-scope="KomparaDesignSystem_722871.VerdictBadge" level="green" hint-size="80px,30px"></x-import></div>
    <div class="listrow"><span style="font-size:14px">22:00–23:00</span><x-import component-from-global-scope="KomparaDesignSystem_722871.VerdictBadge" level="yellow" hint-size="90px,30px"></x-import></div>
  </div>
</div>
</x-dc>
</body>
</html>
