<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Lector (reader + overlay)" description="The screen-reader status screen with the live verdict chip floating over a simulated offer" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 55%, #020617 100%);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:var(--font-sans)}
    .frame{width:390px;height:760px;border-radius:40px;overflow:hidden;position:relative;background:var(--background);box-shadow:0 24px 70px rgba(2,6,23,.6),0 0 0 10px #0b1120,0 0 0 11px #1e293b;display:flex;flex-direction:column}
    .sb{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:600;color:var(--text-body);flex:none}
    .body{flex:1;overflow-y:auto;padding:16px}
    .h1{font-size:24px;font-weight:700;color:var(--text-strong)}
    .p{font-size:14px;color:var(--text-muted);margin-top:6px;line-height:1.5}
    .card{background:var(--surface-card);border-radius:12px;padding:16px;margin-top:16px}
    .row{display:flex;align-items:center;justify-content:space-between}
    .dot{width:9px;height:9px;border-radius:999px;background:var(--primary)}
    .host{margin-top:16px;border-radius:16px;overflow:hidden;border:1px solid var(--border);position:relative;height:220px;background:linear-gradient(160deg,#11161f,#0b0f17)}
    .stack{margin-top:16px;display:flex;flex-direction:column;gap:10px}
  </style>
</helmet>
<div class="frame theme-dark">
  <div class="sb"><span>9:41</span><span>▲ Kompara · 100%</span></div>
  <div class="body">
    <div class="h1">Lector</div>
    <div class="p">Kompara lee las ofertas en tu pantalla y les pone el semáforo encima. Todo se queda en tu teléfono.</div>
    <div class="card">
      <div class="row">
        <div style="display:flex;align-items:center;gap:8px"><span class="dot"></span><span style="font-size:16px;font-weight:700;color:var(--text-strong)">Lector de pantalla</span></div>
        <span style="font-size:12px;font-weight:500;color:var(--primary)">Activo</span>
      </div>
    </div>
    <div class="host">
      <div style="padding:16px"><div style="font-size:12px;color:var(--text-faint)">Oferta entrante · Uber</div><div style="font-size:30px;font-weight:800;color:#fff;margin-top:6px">$148</div><div style="font-size:13px;color:#94a3b8;margin-top:4px">16 km · 22 min · efectivo</div></div>
      <div style="position:absolute;right:14px;bottom:14px"><x-import component-from-global-scope="KomparaDesignSystem_722871.VerdictChip" level="green" hero-rate="$9.20/km" secondary-rate="$165/h" hint-size="150px,110px"></x-import></div>
    </div>
    <div class="stack">
      <x-import component-from-global-scope="KomparaDesignSystem_722871.Button" variant="primary" full-width="{{ true }}" hint-size="100%,52px">Detener lector de pantalla</x-import>
      <x-import component-from-global-scope="KomparaDesignSystem_722871.Button" variant="secondary" full-width="{{ true }}" hint-size="100%,52px">Ajustar mi semáforo</x-import>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
