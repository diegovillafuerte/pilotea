services:
  - type: web
    name: kompara
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build && pnpm db:migrate
    startCommand: pnpm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pilotea-db
          property: connectionString
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_TEMPLATE_SID
        sync: false
      - key: MAGIC_LINK_BASE_URL
        sync: false

  # ── Forward product: native-Android backend (Hono service in backend/) ──
  # The `kompara` service above is the legacy Next.js web app (reference impl,
  # sunset at E-010). This is the greenfield backend the Android app talks to
  # (auth, benchmarks, imports). If you're only deploying the backend, you can
  # comment out the `kompara` web service + `pilotea-db` below.
  #
  # Runs via tsx (the repo's `start` script) — no tsc build step — so the build
  # installs dev deps (tsx + drizzle-kit are devDependencies) with --prod=false.
  - type: web
    name: kompara-backend
    runtime: node
    region: oregon
    plan: free # `starter` avoids free-tier cold starts once you have real users
    rootDir: backend
    buildCommand: pnpm install --prod=false && pnpm db:migrate
    startCommand: pnpm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kompara-backend-db
          property: connectionString
      # WhatsApp OTP delivery. TWILIO_TEMPLATE_SID (an approved Authentication
      # template) is REQUIRED for production — without it sends fail with 63016
      # for anyone outside the Twilio sandbox. See docs/whatsapp-otp-setup.md.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_TEMPLATE_SID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      # Replace the committed dev spec-signing key before launch (techdebt TD-013).
      - key: SPEC_SIGNING_PRIVATE_KEY
        sync: false

  # Cron jobs (placeholders — implement when features are ready)
  # - type: cron
  #   name: kompara-stats-update
  #   runtime: node
  #   region: oregon
  #   schedule: "0 4 * * *"  # daily at 4am UTC
  #   buildCommand: pnpm install && pnpm build
  #   startCommand: node dist/jobs/stats-update.js
  #   envVars: *shared-env
  #
  # - type: cron
  #   name: kompara-magic-link-cleanup
  #   schedule: "0 * * * *"  # hourly
  #   ...
  #
  # - type: cron
  #   name: kompara-weekly-reminder
  #   schedule: "0 9 * * 1"  # Monday 9am UTC
  #   ...

databases:
  - name: pilotea-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "18"

  # Dedicated DB for the Android backend (separate schema/migrations from the web app).
  - name: kompara-backend-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "18"
