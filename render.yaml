services:
  - type: web
    name: kompara
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kompara-db
          property: connectionString
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_TEMPLATE_SID
        sync: false
      - key: MAGIC_LINK_BASE_URL
        sync: false

  # Cron jobs (placeholders — implement when features are ready)
  # - type: cron
  #   name: kompara-stats-update
  #   runtime: node
  #   region: oregon
  #   schedule: "0 4 * * *"  # daily at 4am UTC
  #   buildCommand: pnpm install && pnpm build
  #   startCommand: node dist/jobs/stats-update.js
  #   envVars: *shared-env
  #
  # - type: cron
  #   name: kompara-magic-link-cleanup
  #   schedule: "0 * * * *"  # hourly
  #   ...
  #
  # - type: cron
  #   name: kompara-weekly-reminder
  #   schedule: "0 9 * * 1"  # Monday 9am UTC
  #   ...

databases:
  - name: kompara-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
